<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洗車ログ Pro v6</title>
    <style>
        :root { --primary: #0056b3; --bg: #f8f9fa; --text: #000; --accent: #d9534f; --chart-line: #dee2e6; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #fff; color: var(--text); line-height: 1.4; }
        h2 { border-left: 5px solid var(--primary); padding-left: 10px; margin: 20px 0 10px; font-size: 1.1rem; }
        .card { background: var(--bg); padding: 12px; border-radius: 10px; border: 1px solid #dee2e6; margin-bottom: 15px; }
        
        /* グラフエリア */
        .chart-container { overflow-x: auto; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px; margin-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .chart-wrapper { position: relative; }
        .chart-row { display: flex; align-items: center; border-bottom: 1px solid var(--chart-line); height: 35px; }
        .chart-label { width: 130px; font-size: 0.65rem; font-weight: bold; position: sticky; left: 0; background: #fff; z-index: 10; border-right: 1px solid #ddd; padding-right: 4px; }
        .chart-timeline { flex-grow: 1; position: relative; height: 100%; }
        .chart-marker { position: absolute; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; top: 50%; transform: translate(-50%, -50%); border: 1.5px solid #fff; }

        /* 入力フォーム */
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        textarea { height: 60px; resize: none; font-size: 0.9rem; }
        
        /* ケミカル選択のチップ */
        .chemical-input-area { margin-top: 5px; padding-left: 34px; display: none; }
        .chemical-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .chip { background: #e9ecef; border-radius: 15px; padding: 4px 10px; font-size: 0.7rem; cursor: pointer; border: 1px solid #ced4da; }
        .chip:active { background: #dee2e6; }

        .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
        .checkbox-item { display: flex; flex-direction: column; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .check-row { display: flex; align-items: center; font-size: 0.95rem; }
        .check-row input { width: 22px; height: 22px; margin-right: 12px; }

        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; margin-bottom: 8px; }
        .btn-small { width: auto; padding: 5px 10px; font-size: 0.75rem; background: #6c757d; display: inline-block; }
        
        .log-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .log-date { font-weight: bold; color: var(--primary); font-size: 0.9rem; }
        .log-memo { font-size: 0.8rem; background: #fff9db; padding: 5px; border-radius: 4px; margin-top: 4px; border: 1px solid #ffec99; }
        .log-actions { margin-top: 8px; display: flex; gap: 8px; }
        .inline-btn { width: auto; padding: 6px 10px; font-size: 0.75rem; margin-bottom: 0; }
        .btn-danger { background: var(--accent); }
        .stat-item { border-bottom: 1px solid #e5e7eb; padding: 8px 0; }
        .stat-item:last-child { border-bottom: none; }
        .stat-title { font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; }
        .stat-meta { font-size: 0.8rem; color: #495057; }
    </style>
</head>
<body>

    <h2>📈 タイムライン</h2>
    <div class="chart-container" id="chartContainer">
        <div id="timelineChart" class="chart-wrapper"></div>
    </div>

    <h2>🚿 記録</h2>
    <div class="card">
        <div class="input-group">
            <label>日付</label>
            <input type="date" id="date">
        </div>
        <div class="input-group">
            <label>場所</label>
            <input type="text" id="location" list="location-list" placeholder="例：自宅、GS" oninput="checkAutoFill(this.value)">
            <datalist id="location-list"><option value="自宅"><option value="GS(洗車機)"><option value="キーパーラボ"></datalist>
        </div>
        
        <label>メンテナンス項目</label>
        <div class="checkbox-group" id="menuGroup">
            </div>

        <div class="input-group" style="margin-top:15px;">
            <label>メモ (100文字以内)</label>
            <textarea id="memo" maxlength="100" placeholder="例：気温高め、ヒンジ清掃予定など"></textarea>
        </div>
        
        <button id="saveBtn" onclick="saveLog()">保存</button>
        <button id="cancelEditBtn" class="btn-small" onclick="cancelEdit()" style="display:none; background:#495057;">編集キャンセル</button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom: 20px;">
        <button class="btn-small" onclick="exportData()">データ保存</button>
        <button class="btn-small" onclick="importData()" style="background:#495057;">データ復元</button>
    </div>

    <h2>📜 直近の履歴</h2>
    <div id="logList"></div>

    <h2>📊 メンテナンス統計</h2>
    <div id="statsList" class="card"></div>

    <script>
        document.getElementById('date').valueAsDate = new Date();
        let editingIndex = null;
        const config = {
            items: ["シャンプー", "水垢除去", "鉄粉除去", "ホイール清掃", "タイヤワックス", "ガラス撥水", "ガラス鱗取り", "隙間清掃", "車内清掃", "プロ施工"],
            chemicalTargets: ["シャンプー", "水垢除去", "鉄粉除去", "撥水コート", "ガラス撥水"]
        };

        function getHistory() {
            return JSON.parse(localStorage.getItem('carWashLogs') || '[]');
        }

        function setHistory(history) {
            history.sort((a, b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('carWashLogs', JSON.stringify(history));
        }

        function resetForm() {
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('location').value = '';
            document.getElementById('memo').value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(el => { el.checked = false; });
            config.chemicalTargets.forEach(item => {
                const input = document.getElementById(`input-chem-${item}`);
                if (input) input.value = '';
                toggleChem(item);
            });
            editingIndex = null;
            document.getElementById('saveBtn').textContent = '保存';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        function refreshAll() {
            updateChips();
            renderChart();
            renderLogs();
            renderStats();
        }

        // フォーム生成
        function initForm() {
            const container = document.getElementById('menuGroup');
            container.innerHTML = config.items.map(item => `
                <div class="checkbox-item">
                    <div class="check-row">
                        <input type="checkbox" id="check-${item}" value="${item}" onchange="toggleChem('${item}')">
                        <label for="check-${item}">${item}</label>
                    </div>
                    ${config.chemicalTargets.includes(item) ? `
                    <div class="chemical-input-area" id="chem-area-${item}">
                        <input type="text" id="input-chem-${item}" placeholder="ケミカル名/洗車機など">
                        <div class="chemical-chips" id="chips-${item}"></div>
                    </div>` : ''}
                </div>
            `).join('');
            updateChips();
        }

        function toggleChem(item) {
            const area = document.getElementById(`chem-area-${item}`);
            if (area) area.style.display = document.getElementById(`check-${item}`).checked ? 'block' : 'none';
        }

        // 場所に「GS」が入ったら自動でシャンプーを洗車機に
        function checkAutoFill(val) {
            if (val.includes("GS") || val.includes("洗車機")) {
                const checkShampoo = document.getElementById('check-シャンプー');
                if (checkShampoo) {
                    checkShampoo.checked = true;
                    toggleChem('シャンプー');
                    document.getElementById('input-chem-シャンプー').value = "洗車機";
                }
            }
        }

        // 過去のケミカル履歴からチップを作成
        function updateChips() {
            const history = JSON.parse(localStorage.getItem('carWashLogs') || '[]');
            config.chemicalTargets.forEach(item => {
                const chipsContainer = document.getElementById(`chips-${item}`);
                if (!chipsContainer) return;
                
                // 過去に使用したケミカルのリスト
                const pastChems = [...new Set(history.flatMap(log => 
                    log.details ? log.details.filter(d => d.name === item).map(d => d.chem) : []
                ))].filter(Boolean).slice(0, 5);

                chipsContainer.innerHTML = pastChems.map(c => `
                    <div class="chip" onclick="document.getElementById('input-chem-${item}').value='${c}'">${c}</div>
                `).join('');
            });
        }

        function saveLog() {
            const menus = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(el => {
                const item = el.value;
                const chemInput = document.getElementById(`input-chem-${item}`);
                return { name: item, chem: chemInput ? chemInput.value : "" };
            });

            if (menus.length === 0) return alert("内容を選択してください");
            if (!document.getElementById('date').value) return alert("日付を入力してください");

            const log = {
                date: document.getElementById('date').value,
                location: document.getElementById('location').value || "未記入",
                details: menus,
                memo: document.getElementById('memo').value
            };

            const history = getHistory();
            if (editingIndex === null) {
                history.unshift(log);
            } else {
                history[editingIndex] = log;
            }
            setHistory(history);

            alert(editingIndex === null ? "保存しました" : "更新しました");
            resetForm();
            refreshAll();
        }

        function renderChart() {
            const history = getHistory();
            const chartWrapper = document.getElementById('timelineChart');
            if (history.length === 0) {
                chartWrapper.innerHTML = '<div style="padding:8px; color:#666; font-size:0.85rem;">記録がありません</div>';
                return;
            }

            const dates = history.map(h => new Date(h.date));
            const minDate = new Date(Math.min(...dates));
            const startDate = new Date(minDate); startDate.setDate(startDate.getDate() - 7);
            const totalDays = Math.ceil((new Date() - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const dayWidth = totalDays > 365 ? 4 : 8;
            const timelineWidth = totalDays * dayWidth;
            chartWrapper.style.width = (timelineWidth + 100) + 'px';

            let html = '';
            // メンテナンス項目ごとの行
            config.items.forEach(item => {
                const itemLogs = history.filter(log => log.details.some(d => d.name === item));
                html += `<div class="chart-row"><div class="chart-label">${item} (${itemLogs.length}回)</div><div class="chart-timeline" style="width:${timelineWidth}px;">`;
                itemLogs.forEach(log => {
                    const pos = (new Date(log.date) - startDate) / (1000 * 60 * 60 * 24) * dayWidth;
                    html += `<div class="chart-marker" style="left:${pos}px;"></div>`;
                });
                html += `</div></div>`;
            });

            // 横軸日付ラベル行
            html += `<div class="chart-row" style="height:22px; background:#f8f9fa; border-bottom:none;">`;
            html += `<div class="chart-label" style="background:#f8f9fa; border-right:1px solid #ddd;"></div>`;
            html += `<div class="chart-timeline" style="width:${timelineWidth}px; position:relative;">`;
            // 日付ラベルを7日ごとに表示
            for (let i = 0; i < totalDays; i += 7) {
                const date = new Date(startDate.getTime());
                date.setDate(date.getDate() + i);
                const label = `${date.getMonth() + 1}/${date.getDate()}`;
                html += `<span style="position:absolute; left:${i * dayWidth}px; font-size:0.7rem; color:#888; white-space:nowrap;">${label}</span>`;
            }
            html += `</div></div>`;

            chartWrapper.innerHTML = html;
            setTimeout(() => { document.getElementById('chartContainer').scrollLeft = 99999; }, 200);
        }

        function renderLogs() {
            const history = getHistory();
            if (history.length === 0) {
                document.getElementById('logList').innerHTML = '<div class="card" style="font-size:0.85rem; color:#666;">履歴がありません</div>';
                return;
            }

            document.getElementById('logList').innerHTML = history.map((item, index) => `
                <div class="log-item">
                    <span class="log-date">${item.date}</span> @${item.location}<br>
                    <small style="color:#444;">${item.details.map(d => d.name + (d.chem ? `(${d.chem})` : "")).join(' / ')}</small>
                    ${item.memo ? `<div class="log-memo">📝 ${item.memo}</div>` : ''}
                    <div class="log-actions">
                        <button class="inline-btn" onclick="startEditLog(${index})">修正</button>
                        <button class="inline-btn btn-danger" onclick="deleteLog(${index})">削除</button>
                    </div>
                </div>
            `).join('');
        }

        function renderStats() {
            const history = getHistory();
            const statsList = document.getElementById('statsList');
            const now = new Date();

            if (history.length === 0) {
                statsList.innerHTML = '<div style="font-size:0.85rem; color:#666;">記録がありません</div>';
                return;
            }

            statsList.innerHTML = config.items.map(item => {
                const itemDates = history
                    .filter(log => log.details.some(d => d.name === item))
                    .map(log => new Date(log.date))
                    .sort((a, b) => a - b);

                const count = itemDates.length;
                const avgIntervalText = count >= 2
                    ? `${(itemDates.slice(1).reduce((sum, date, i) => sum + ((date - itemDates[i]) / (1000 * 60 * 60 * 24)), 0) / (count - 1)).toFixed(1)}日おき`
                    : '記録2回以上で表示';

                const elapsedWeeksText = count >= 1
                    ? `${((now - itemDates[count - 1]) / (1000 * 60 * 60 * 24 * 7)).toFixed(1)}週間経過`
                    : '未実施';

                return `
                    <div class="stat-item">
                        <div class="stat-title">${item}</div>
                        <div class="stat-meta">累計 ${count}回 / 平均 ${avgIntervalText} / ${elapsedWeeksText}</div>
                    </div>
                `;
            }).join('');
        }

        function startEditLog(index) {
            const history = getHistory();
            const target = history[index];
            if (!target) return;

            editingIndex = index;
            document.getElementById('date').value = target.date;
            document.getElementById('location').value = target.location;
            document.getElementById('memo').value = target.memo || '';

            document.querySelectorAll('input[type="checkbox"]').forEach(el => { el.checked = false; });
            config.chemicalTargets.forEach(item => {
                const input = document.getElementById(`input-chem-${item}`);
                if (input) input.value = '';
                toggleChem(item);
            });

            target.details.forEach(detail => {
                const check = document.getElementById(`check-${detail.name}`);
                if (check) {
                    check.checked = true;
                    toggleChem(detail.name);
                }
                const chemInput = document.getElementById(`input-chem-${detail.name}`);
                if (chemInput) chemInput.value = detail.chem || '';
            });

            document.getElementById('saveBtn').textContent = '更新保存';
            document.getElementById('cancelEditBtn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            resetForm();
        }

        function deleteLog(index) {
            if (!confirm('この履歴を削除しますか？')) return;
            const history = getHistory();
            history.splice(index, 1);
            setHistory(history);

            if (editingIndex === index) {
                resetForm();
            } else if (editingIndex !== null && index < editingIndex) {
                editingIndex -= 1;
            }

            refreshAll();
        }

        function exportData() {
            const blob = new Blob([localStorage.getItem('carWashLogs')], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `wash_log_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => {
                    localStorage.setItem('carWashLogs', event.target.result);
                    resetForm();
                    refreshAll();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }

        initForm();
        refreshAll();
    </script>
</body>
</html>
